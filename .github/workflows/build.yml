name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android-apk'
        type: choice
        options:
          - android-apk
          - android-aab
          - ios

# ─────────────────────────────────────────────────────────────────────────────
# ANDROID
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: Android Release Build
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      github.event.inputs.platform == 'android-apk' ||
      github.event.inputs.platform == 'android-aab' ||
      github.event.inputs.platform == ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "APP_ENV=production" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode keystore
        run: |
          # Strip certutil headers/footers (-----BEGIN/END CERTIFICATE-----),
          # remove all CR, LF and spaces, then decode clean base64.
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" \
            | grep -v '^-----' \
            | tr -d '\r\n ' \
            | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build APK
        if: >
          github.event.inputs.platform == 'android-apk' ||
          github.event.inputs.platform == '' ||
          !startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Build App Bundle
        if: >
          github.event.inputs.platform == 'android-aab' ||
          startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info

      - name: Upload APK
        if: github.event.inputs.platform != 'android-aab'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        if: >
          github.event.inputs.platform == 'android-aab' ||
          startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true

# ─────────────────────────────────────────────────────────────────────────────
# IOS — builds an unsigned IPA on a free GitHub macOS runner.
#
# Install on your iPhone for free using AltStore (altstore.io) or SideStore.
# For App Store distribution you need Apple Developer signing — see the
# "With signing" section below and add the required secrets.
# ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS Build (unsigned IPA)
    runs-on: macos-latest
    if: >
      github.event.inputs.platform == 'ios' ||
      startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "APP_ENV=production" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Builds the .app without any Apple signing certificate.
      # The resulting IPA can be sideloaded with AltStore / SideStore (free).
      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign

      # Package the .app into a distributable .ipa
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa-payload/Payload
          cp -r build/ios/iphoneos/Runner.app \
                build/ios/ipa-payload/Payload/
          cd build/ios/ipa-payload
          zip -r ../WorkHours.ipa Payload/
          cd ../../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa-${{ github.ref_name }}
          path: build/ios/WorkHours.ipa
          retention-days: 30

      # ── OPTIONAL: App Store / TestFlight signed build ──────────────────────
      # Uncomment and add these secrets to enable a signed build:
      #   IOS_CERTIFICATE_P12   – base64-encoded .p12 distribution certificate
      #   IOS_CERTIFICATE_PASS  – password for the .p12
      #   IOS_PROVISIONING      – base64-encoded .mobileprovision
      #   IOS_TEAM_ID           – your 10-char Apple team ID
      # ─────────────────────────────────────────────────────────────────────────
