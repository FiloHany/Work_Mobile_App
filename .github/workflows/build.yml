      #   run: |
      #     echo "${{ secrets.IOS_CERTIFICATE_P12 }}" | base64 -d > cert.p12
      #     security create-keychain -p temp build.keychain
      #     security import cert.p12 -k build.keychain \
      #       -P "${{ secrets.IOS_CERTIFICATE_PASS }}" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: \
      #       -s -k temp build.keychain
      #     security default-keychain -s build.keychain
      #     echo "${{ secrets.IOS_PROVISIONING }}" | base64 -d \
      #       > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
