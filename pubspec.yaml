name: work_app
description: Faculty Attendance & Work Hours Optimization App
publish_to: none
version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Models & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^5.0.2
  timezone: ^0.9.4

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  equatable: ^2.0.5

  # Image & OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1

  # UI
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A3A6B"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
